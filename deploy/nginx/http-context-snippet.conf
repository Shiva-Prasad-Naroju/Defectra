# ═══════════════════════════════════════════════════════════════════════════
# Paste these directives INSIDE the top-level `http { ... }` block of nginx.conf
# (before any `include sites-enabled/*`). Then include `defectra.conf`.
# ═══════════════════════════════════════════════════════════════════════════

# Remote IP when behind ngrok / another trusted proxy (adjust if you chain proxies)
map $http_x_forwarded_for $defectra_real_ip {
    default $remote_addr;
    ~^(?P<first>[0-9.]+|[0-9a-fA-F:]+) $first;
}

# Rate limit zones (burst allows small spikes; tune for your org)
limit_req_zone $defectra_real_ip zone=defectra_login:10m rate=5r/m;
limit_req_zone $defectra_real_ip zone=defectra_api:10m rate=60r/s;
limit_req_zone $defectra_real_ip zone=defectra_upload:10m rate=10r/m;

limit_req_status 429;
