# ═══════════════════════════════════════════════════════════════════════════
# SiteSureLabs / Defectra — reverse proxy (localhost-only upstreams)
#
# 1. Merge `http-context-snippet.conf` into the `http {}` block of nginx.conf
# 2. Replace /opt/defectra with your install path (use forward slashes)
# 3. include this file from http {}:
#      include D:/Defectra/deploy/nginx/defectra.conf;
# 4. Build: cd frontend && npm run build
# 5. Backend:
#      uv run uvicorn main:app --host 127.0.0.1 --port 8010 --workers 2
#         (no --reload in production; set DEBUG off / env for secrets)
#
# Tunnel: point ngrok at http://127.0.0.1:8080 only — never at :8010 or Vite.
# ═══════════════════════════════════════════════════════════════════════════

map $http_x_forwarded_proto $defectra_hsts {
    default "";
    https   "max-age=31536000; includeSubDomains; preload";
}

server {
    listen 127.0.0.1:8080;
    listen [::1]:8080;
    server_name localhost;

    root D:/Defectra/frontend/dist;
    index index.html;

    server_tokens off;

    client_max_body_size 52m;
    client_body_timeout 120s;
    client_header_timeout 30s;
    large_client_header_buffers 4 16k;

    access_log D:/Defectra/deploy/nginx/logs/defectra_access.log combined;
    error_log  D:/Defectra/deploy/nginx/logs/defectra_error.log warn;

    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy      "accelerometer=(), camera=(), geolocation=(), microphone=()" always;
    add_header Strict-Transport-Security $defectra_hsts always;

    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'; img-src 'self' data: blob:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src 'self'; upgrade-insecure-requests" always;

    location ~* ^/(?:\.git|\.env|vendor/phpunit|wp-admin|wp-login\.php|phpmyadmin|\.well-known/enterprise) {
        deny all;
        return 404;
    }

    location ~ ^/api/auth/(?:login|register|verify|forgot-password|reset-password) {
        limit_req zone=defectra_login burst=8 nodelay;
        limit_req zone=defectra_api burst=100 nodelay;

        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;
    }

    # Optional enterprise: restrict /api/admin to VPN/office IPs (edit CIDRs)
    # location ^~ /api/admin/ {
    #     allow 10.0.0.0/8;
    #     deny all;
    #     limit_req zone=defectra_api burst=120 nodelay;
    #     proxy_pass http://127.0.0.1:8010;
    #     include D:/Defectra/deploy/nginx/proxy-params.conf;
    # }

    location ~ ^/api/(?:chat|assistant)/ {
        limit_req zone=defectra_api burst=80 nodelay;

        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;

        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ~ ^/api/(?:defects|defect)/ {
        limit_req zone=defectra_upload burst=20 nodelay;
        limit_req zone=defectra_api burst=100 nodelay;

        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location ^~ /api/ {
        limit_req zone=defectra_api burst=120 nodelay;

        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;
    }

    location ^~ /uploads/ {
        limit_req zone=defectra_upload burst=30 nodelay;

        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;

        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/index.html /index.html;
        limit_req zone=defectra_api burst=200 nodelay;
    }

    location = /api/health {
        access_log off;
        proxy_pass http://127.0.0.1:8010;
        include D:/Defectra/deploy/nginx/proxy-params.conf;
    }
}
